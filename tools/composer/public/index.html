<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame Component Composer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <!-- Add more layout extensions if needed -->
</head>

<body>
    <div id="top-bar">
        <span class="logo">🔥 Flame Composer</span>
        <div class="controls">
            <input type="text" id="dir-path" placeholder="/absolute/path/to/json/files" class="path-input">
            <button id="btn-open">Open</button>
            <button id="btn-create" title="Create New Json File">Create</button>
            <button id="btn-save" class="primary">Save & Update</button>
        </div>
    </div>

    <div id="main-container">
        <div id="cy-container"></div>
        <div id="properties-panel">
            <div class="panel-header">
                <h3>Properties</h3>
                <span id="selected-component-name">No component selected</span>
            </div>
            <div id="editor-content">
                <!-- Dynamic Content Here -->
            </div>
        </div>
    </div>

    <!-- File Browser Modal -->
    <div id="modal-backdrop" class="hidden">
        <div id="file-browser-modal">
            <div class="modal-header">
                <h3>Select Directory</h3>
                <span id="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="browser-controls">
                    <button id="btn-up" title="Go Up">⬆ Up</button>
                    <input type="text" id="browser-current-path" readonly>
                </div>
                <ul id="dir-list">
                    <!-- Directory items -->
                </ul>
            </div>
            <div class="modal-footer">
                <button id="btn-cancel">Cancel</button>
                <button id="btn-select" class="primary">Select This Directory</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
